name: SDIF
options:
  bundleIdPrefix: org.oddb
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "4B37356EGR"

targets:
  SDIF:
    type: application
    platform: iOS
    sources:
      - SDIF
    resources:
      - SDIF/Resources
    settings:
      base:
        INFOPLIST_FILE: SDIF/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: org.oddb.sdif
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MULTIPLE_WINDOWS: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: SDIF/Info.plist
      properties:
        CFBundleName: SDIF
        CFBundleDisplayName: SDIF
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        NSAppTransportSecurity:
          NSExceptionDomains:
            pillbox.oddb.org:
              NSExceptionAllowsInsecureHTTPLoads: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

  SDIFUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - SDIFUITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: SDIF
